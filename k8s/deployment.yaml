apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-aventureros
  namespace: grupo13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-aventureros
  template:
    metadata:
      labels:
        app: backend-aventureros
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: backend-aventureros
        image: ghcr.io/sebas0430/backend_aventureros:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-aventureros
  namespace: grupo13
spec:
  selector:
    app: backend-aventureros
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
   name: backend-aventureros
   namespace: grupo13
spec:
   ingressClassName: public
   rules:
   - host: grupo13.inphotech.co
     http:
       paths:
       - path: /api
         pathType: Prefix
         backend:
           service:
             name: backend-aventureros
             port:
               number: 80